<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsNecromantiam</title>
</head>

<body>
    <ul id="Daly">
        <li>
            ・プロジェクトを立てた
            ・ビルドを便利にするためのものを作り始めた
        </li>
        <li>
            ・前回の続き
            ・もうちょっとやってみたいことがあったが断念
        </li>
        <li>
            ・この文を書き始める
            ・キャラクター周りの構想を考えながら作成を開始
        </li>
        <li>
            ・毎回"h3"とか"br"とか書くのがめんどくさいのでJSをかく
            ・JSを久しぶりに書くため手こずる"document"さえ忘れる悲しさ
        </li>
        <li>
            ・InputSystemを初めて使ってみたがなんか調べてもようわからん
            ・素材探し
        </li>
        <li>
            ・InputSystemなんとなくわかってきた
            ・とりあえず移動処理を作った
        </li>
    </ul>
</body>

<script>
    const m_Daly = document.getElementById("Daly");

    var lis = m_Daly.getElementsByTagName('li');

    for (var i = 0; i < lis.length; ++i) {
        texts = lis[i].innerHTML.split('\n');
        texts[0] = `<h3>${i + 1}日目</h3>`;

        for (var j = 1; j < texts.length - 1; j++)texts[j] += "</br>";

        lis[i].innerHTML = "";
        texts.forEach(text => lis[i].innerHTML += text);
    }
</script>

</html>
